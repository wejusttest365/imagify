<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebToolOcean Pro Editor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="editor.js"></script>
<link href="editor.css" rel="stylesheet">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="section">
<h3>Text</h3>
<button onclick="addText()">Add Text</button>
</div>

<div class="section">
<h3>Add Shapes</h3>
	<div class="shapecontainer">
<button onclick="addRect()">Rectangle</button>
<button onclick="addCircle()">Circle</button>
<button onclick="addTriangle()">Triangle</button>
</div>
	</div>
<div class="section group">
<label>Set Opacity</label>
<input title="Chnage Shape and Text Opacity"  type="range" id="objOpacity" min="0" max="1" step="0.1">
</div>
<div class="section">
<h3>Upload</h3>
<label class="upload">
📤 Upload Image
<input type="file" id="upload" hidden>
</label>
</div>

<h3>Background</h3>

<label>Solid Color</label>
<input title="Change Backgroung Color"  type="color" id="bgColor">
	<hr />
	 <label> Background Opacity</label>
<input  title="Change Background Color Opacity"  type="range" id="bgOpacity" min="0" max="1" step="0.1" value="1">
	<hr />

<label>Gradient</label>
	<div class="gradcover">
<input title="Color 1" type="color" id="grad1">
<input title="Color 2"  type="color" id="grad2">
		</div>
<button onclick="setGradient()">Apply Gradient</button>

 


<div class="section">
<h3>Canvas</h3>
<button onclick="openResize()">Resize Canvas</button>
<div id="sizeLabel"></div>
</div>

<div class="section">
<h3>Mask</h3>
<button onclick="maskInside()">Mask Image Inside Shape</button>
</div>


	
	
</div>

<!-- MAIN -->
<div class="main">

<!-- TOOLBAR -->
<div class="toolbar">

<div class="toolbar-left">

<div class="group">
<label>Font</label>
<select id="fontFamily">
<option>Arial</option>
<option>Poppins</option>
<option>Roboto</option>
<option>Montserrat</option>
<option>Courier New</option>
<option>Georgia</option>
<option>Verdana</option>
</select>
</div>

<div class="group">
<label>Size</label>
<input type="number" id="fontSize">
</div>

<div class="group">
<label>Color</label>
<input type="color" id="fontColor">
</div>

<div class="group">
<label>Style</label>
<div style="display:flex;gap:5px;">
<button onclick="toggleBold()">B</button>
<button onclick="toggleItalic()">I</button>
</div>
</div>
	<div class="group">
		<label>Shape Skew Option</label>
	<input type="range" id="skewX" min="-45" max="45" value="0">
<input type="range" id="skewY" min="-45" max="45" value="0">
	</div>
<div class="group">
  <label>Fill Color</label>
  <input type="color" id="fillColor">
	
</div>
<div class="group">
<label>Border</label>
<input type="color" id="borderColor">
<input type="number" id="borderWidth">
</div>
	<div class="group">
<button onclick="undo()" title="Undo"><i class="fa-solid fa-rotate-left"></i></button>
<button onclick="redo()" title="Redo"><i class="fa-solid fa-rotate-right"></i></button>
			
</div>
<div class="group">
		
<label>Align</label>
<div style="display:flex;gap:5px;">
<button  title="Align Left" onclick="align('left')">L</button>
<button  title="Align Center" onclick="align('center')">C</button>
<button  title="Align Right" onclick="align('right')">R</button>
</div>
	
</div>

<div class="group">
<label>Clip</label>
<select onchange="applyClip(this.value)">
<option value="">None</option>
<option value="circle">Circle</option>
<option value="square">Square</option>
<option value="triangle">Triangle</option>
<option value="hex">Hexagon</option>
<option value="pent">Pentagon</option>
</select>
</div>
<div class="group updownlayer">
	<label>Move Object</label>
	<button  title="Move Up" onclick="bringForward()">↑</button>
<button  title="Move Down" onclick="sendBackward()">↓</button>
<!--<button onclick="bringToFront()">Top</button>
<button onclick="sendToBack()">Bottom</button>-->
	</div>
</div>

<button onclick="download()" style="width:auto;padding:8px 15px;">Download</button>

</div>

<!-- CANVAS -->
<div class="canvas-wrap">
	<canvas id="canvas" width="900" height="500"></canvas>
		<div id="vGuide" class="guide"></div>
		<div id="hGuide" class="guide"></div>
	</div>
</div>

<!-- RESIZE MODAL -->
<div id="resizeModal">
<div class="modal-box">
<h3>Resize Canvas</h3>
<input type="number" id="canvasW" placeholder="Width">
<input type="number" id="canvasH" placeholder="Height">
<button onclick="applyResize()" style="background:#2563eb;color:#fff;">Apply</button>
<button onclick="closeResize()">Cancel</button>
</div>
</div>
 

</body>
</html>
