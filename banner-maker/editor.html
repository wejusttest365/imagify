 <script>
const canvas = new fabric.Canvas('canvas');
canvas.preserveObjectStacking = true;

/* ================= UNDO REDO ================= */
let history = [];
let historyIndex = -1;

function saveState(){
  history = history.slice(0, historyIndex + 1);
  history.push(JSON.stringify(canvas.toJSON()));
  historyIndex++;
}

function undo(){
  if(historyIndex > 0){
    historyIndex--;
    canvas.loadFromJSON(history[historyIndex], () => canvas.renderAll());
  }
}

function redo(){
  if(historyIndex < history.length - 1){
    historyIndex++;
    canvas.loadFromJSON(history[historyIndex], () => canvas.renderAll());
  }
}

// events
canvas.on("object:added", () => setTimeout(saveState, 100));
canvas.on("object:modified", () => setTimeout(saveState, 100));
canvas.on("object:removed", () => setTimeout(saveState, 100));

// keyboard
document.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.key === "z"){ e.preventDefault(); undo(); }
  if(e.ctrlKey && e.key === "y"){ e.preventDefault(); redo(); }
});

/* ================= LIVE COLORS ================= */

// shape/text color
fillColor.oninput = function(){
  const obj = canvas.getActiveObject();
  if(!obj || obj.type === "image") return;

  obj.set("fill", this.value);
  canvas.renderAll();
};

// background color
bgColor.oninput = function(){
  canvas.setBackgroundColor(this.value, canvas.renderAll.bind(canvas));
};

// gradient
grad1.oninput = grad2.oninput = function(){
  const g = new fabric.Gradient({
    type: "linear",
    coords: {x1:0, y1:0, x2:canvas.width, y2:canvas.height},
    colorStops: [
      {offset:0, color:grad1.value},
      {offset:1, color:grad2.value}
    ]
  });
  canvas.setBackgroundColor(g, canvas.renderAll.bind(canvas));
};

/* ================= BASIC TOOLS ================= */

function addText(){
  canvas.add(new fabric.IText("Edit me",{left:100,top:100}));
}

function addRect(){
  canvas.add(new fabric.Rect({left:100,top:100,width:150,height:100,fill:"blue"}));
}

function addCircle(){
  canvas.add(new fabric.Circle({left:150,top:150,radius:50,fill:"green"}));
}

function addTriangle(){
  canvas.add(new fabric.Triangle({left:150,top:150,width:100,height:100,fill:"orange"}));
}

/* ================= IMAGE UPLOAD ================= */

upload.onchange = e=>{
  const reader = new FileReader();
  reader.onload = ev=>{
    fabric.Image.fromURL(ev.target.result, img=>{
      img.scaleToWidth(200);
      canvas.add(img);
    });
  };
  reader.readAsDataURL(e.target.files[0]);
};

/* ================= RESIZE ================= */

function openResize(){
  resizeModal.style.display="flex";
  canvasW.value = canvas.width;
  canvasH.value = canvas.height;
}

function closeResize(){
  resizeModal.style.display="none";
}

function applyResize(){
  canvas.setWidth(parseInt(canvasW.value));
  canvas.setHeight(parseInt(canvasH.value));
  canvas.renderAll();
  sizeLabel.innerText = canvas.width + " x " + canvas.height;
  closeResize();
}

/* ================= DELETE ================= */

document.addEventListener("keydown", e=>{
  if(e.key==="Delete"){
    const obj = canvas.getActiveObject();
    if(obj) canvas.remove(obj);
  }
});

/* ================= LAYER CONTROLS ================= */

function bringForward(){
  const obj = canvas.getActiveObject();
  if(obj) canvas.bringForward(obj);
}

function sendBackward(){
  const obj = canvas.getActiveObject();
  if(obj) canvas.sendBackwards(obj);
}

function bringToFront(){
  const obj = canvas.getActiveObject();
  if(obj) canvas.bringToFront(obj);
}

function sendToBack(){
  const obj = canvas.getActiveObject();
  if(obj) canvas.sendToBack(obj);
}

/* ================= TEMPLATE LOADER ================= */

  const opacity = parseFloat(this.value);
  const color = bgColor.value;

  // convert HEX → RGB
  function hexToRgb(hex){
    hex = hex.replace("#", "");
    let r = parseInt(hex.substring(0,2),16);
    let g = parseInt(hex.substring(2,4),16);
    let b = parseInt(hex.substring(4,6),16);
    return `rgba(${r},${g},${b},${opacity})`;
  }

  const rgba = hexToRgb(color);

  canvas.setBackgroundColor(rgba, canvas.renderAll.bind(canvas));
};

	   <script>function maskInside(){
  const active = canvas.getActiveObject();

  if(!active || active.type !== "activeSelection"){
    alert("Select image + shape together (Shift + Click)");
    return;
  }

  let img = null, shape = null;

  active._objects.forEach(o=>{
    if(o.type === "image") img = o;
    else shape = o;
  });

  if(!img || !shape){
    alert("Need 1 image + 1 shape");
    return;
  }

  // ================= STEP 1: FIX ORIGIN =================
  img.set({
    originX: 'center',
    originY: 'center'
  });

  shape.set({
    originX: 'center',
    originY: 'center'
  });

  // ================= STEP 2: MOVE IMAGE TO SHAPE =================
  img.set({
    left: shape.left,
    top: shape.top
  });

  // ================= STEP 3: SCALE IMAGE TO COVER SHAPE =================
  const scaleX = shape.getScaledWidth() / img.width;
  const scaleY = shape.getScaledHeight() / img.height;

  const scale = Math.max(scaleX, scaleY); // cover full shape

  img.scale(scale);

  // ================= STEP 4: APPLY CLIP PATH =================
  const clip = shape.clone();

  clip.set({
    originX: 'center',
    originY: 'center'
  });

  img.clipPath = clip;

  // ================= STEP 5: CLEAN =================
  canvas.remove(shape);
  canvas.discardActiveObject();
  canvas.add(img);
  canvas.setActiveObject(img);

  canvas.renderAll();
}
	</script>
	
	
	<script>
	function replaceImage(file){
  const obj = canvas.getActiveObject();
  if(!obj || obj.type !== "image"){
    alert("Select image first");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    fabric.Image.fromURL(e.target.result, function(img){

      img.set({
        left: obj.left,
        top: obj.top,
        scaleX: obj.scaleX,
        scaleY: obj.scaleY
      });

      canvas.remove(obj);
      canvas.add(img);
      canvas.renderAll();

    });
  };

  reader.readAsDataURL(file);
}
	</script>
