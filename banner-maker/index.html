<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Templates | WebToolOcean</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f3f4f6;
}

header {
  padding: 20px;
  text-align: center;
  background: #111827;
  color: #fff;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card:hover {
  transform: translateY(-5px);
}

.preview {
  height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: bold;
}

.card h3 {
  padding: 10px;
  margin: 0;
}
	.preview {
  height: 160px;
  padding: 15px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  border-radius:12px;
  color:#fff;
}

/* Individual designs */
.business {
  background: linear-gradient(135deg,#0f172a,#2563eb);
}

.promo {
  background: linear-gradient(135deg,#f97316,#fb923c);
}

.luxury {
  background: linear-gradient(135deg,#000,#444);
}

.portfolio {
  background: linear-gradient(135deg,#1e293b,#64748b);
}

.ecommerce {
  background: linear-gradient(135deg,#dc2626,#f87171);
}

.preview h2 {
  margin:0;
  font-size:20px;
  font-weight:700;
}

.preview p {
  margin:0;
  font-size:12px;
}
	.preview {
  position: relative;
  height: 160px;
  overflow: hidden;
}

.preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: #fff;
}

.overlay h2 {
  margin: 0;
  font-size: 18px;
}

.overlay p {
  margin: 0;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <h1>🎨 Choose a Banner Template</h1>
</header>

 <div class="grid">

<div class="card" onclick="openEditor('modernBusiness')">
  <div class="preview">
    <img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa" />
    <div class="overlay">
      <h2>Grow Business</h2>
      <p>Professional Solutions</p>
    </div>
  </div>
  <h3>Modern Business</h3>
</div>

<div class="card" onclick="openEditor('instaPromo')">
  <div class="preview promo">
    <h2>50% OFF</h2>
    <p>Limited Offer</p>
  </div>
  <h3>Instagram Promo</h3>
</div>

<div class="card" onclick="openEditor('darkLuxury')">
  <div class="preview luxury">
    <h2>Luxury Brand</h2>
    <p>Exclusive</p>
  </div>
  <h3>Dark Luxury</h3>
</div>

<div class="card" onclick="openEditor('portfolio')">
  <div class="preview portfolio">
    <h2>Your Portfolio</h2>
    <p>Creative Design</p>
  </div>
  <h3>Portfolio</h3>
</div>

<div class="card" onclick="openEditor('ecommerceSale')">
  <div class="preview ecommerce">
    <h2>SALE</h2>
    <p>Shop Now</p>
  </div>
  <h3>E-commerce Sale</h3>
</div>

</div>

<script>
function openEditor(template) {
  window.location.href = "editor.html?template=" + template;
}
</script>
	 
 
</body>
</html>
