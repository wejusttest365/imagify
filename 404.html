<!doctype html>
<html lang="en">

<head>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ToolOcean">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="language" content="English">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="https://webtoolocean.com/images/favicon.png">
  <title>404 - Page Not Found | WebToolOcean</title>
  <meta name="description"
    content="The page you're looking for doesn't exist. Return to WebToolOcean and explore our 100+ free tools.">
  <meta name="robots" content="noindex, nofollow">


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #0c2340 55%, #0f172a 100%);
      color: #334155;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container-404 {
      text-align: center;
      max-width: 600px;
      background: #ffffff;
      border-radius: 12px;
      padding: 60px 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    .error-code {
      font-size: 5rem;
      font-weight: 800;
      color: #3b82f6;
      line-height: 1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 15px;
    }

    .error-message {
      font-size: 1rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #0f172a;
      border-color: #e2e8f0;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .quick-links {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px solid #e2e8f0;
    }

    .quick-links h3 {
      font-size: 0.9rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 15px;
    }

    .links-list {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }

    .links-list a {
      color: #3b82f6;
      text-decoration: none;
      transition: color 0.2s;
    }

    .links-list a:hover {
      color: #2563eb;
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .container-404 {
        padding: 40px 25px;
      }

      .error-code {
        font-size: 3.5rem;
      }

      .error-title {
        font-size: 1.4rem;
      }

      .btn-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>

</head>

<body>
  <div class="container-404">
    <div class="error-code">404</div>
    <div class="error-title">Page Not Found</div>
    <p class="error-message">
      Sorry, the page you're looking for doesn't exist. It might have been moved or deleted. Let's get you back on
      track!
    </p>

    <div class="btn-group">
      <a href="/" class="btn btn-primary">
        ← Back to Home
      </a>
      <a href="/all-tools/" class="btn btn-secondary">
        Browse Tools →
      </a>
    </div>

    <div class="quick-links">
      <h3>Quick Links</h3>
      <div class="links-list">
        <a href="/">Home</a>
        <a href="/blog/">Blog</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
        <a href="/all-tools/">All Tools</a>
      </div>
    </div>
  </div>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.error('SW failed:', err));
    });
  }
</script>
</body>

</html>
