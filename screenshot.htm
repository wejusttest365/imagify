<!DOCTYPE html>
<html>
<head>

<title>Website Screenshot Generator</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f5f6fa;
font-family:Arial;
}

.preview img{
width:100%;
border-radius:6px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.preview{
margin-top:15px;
}

</style>

</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-4">Website Screenshot Generator</h2>

<div class="row justify-content-center mb-4">
<div class="col-md-8">

<div class="input-group">

<input type="text" id="urlInput" class="form-control" placeholder="Enter website URL">

<button class="btn btn-primary" onclick="generateShots()">Generate</button>

</div>

</div>
</div>


<div class="row">

<div class="col-md-4">
<h5>Desktop</h5>
<div class="preview">
<img id="desktopImg">
</div>
</div>

<div class="col-md-4">
<h5>Tablet</h5>
<div class="preview">
<img id="tabletImg">
</div>
</div>

<div class="col-md-4">
<h5>Mobile</h5>
<div class="preview">
<img id="mobileImg">
</div>
</div>

</div>

</div>


<script>

function generateShots(){

let url = document.getElementById("urlInput").value.trim();

if(!url.startsWith("http")){
url = "https://" + url;
}

let base = "https://api.microlink.io/?screenshot=true&fullPage=true&meta=false&embed=screenshot.url&url=";

document.getElementById("desktopImg").src = base + url + "&viewport.width=1280";
document.getElementById("tabletImg").src = base + url + "&viewport.width=768";
document.getElementById("mobileImg").src = base + url + "&viewport.width=375";

}

</script>

</body>
</html>
