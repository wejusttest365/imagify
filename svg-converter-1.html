<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVG Converter - Convert SVG to PNG JPG WEBP ICO</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6fb;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.generator{
display:grid;
grid-template-columns:350px 1fr;
gap:30px;
}

.controls{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.preview-area{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

.dropzone{
border:2px dashed #cbd5e1;
padding:40px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.dropzone:hover{
border-color:#6366f1;
background:#f8f9ff;
}

.control{
margin-top:15px;
}

.control label{
display:block;
font-size:14px;
margin-bottom:5px;
}

.control input,
.control select{
width:100%;
padding:8px;
border:1px solid #ddd;
border-radius:6px;
}

.preview img{
max-width:100%;
margin-top:20px;
}

button{
margin-top:20px;
padding:12px 18px;
border:none;
background:#6366f1;
color:white;
border-radius:8px;
cursor:pointer;
font-size:15px;
width:100%;
}

button:hover{
background:#4f46e5;
}

.file-list{
margin-top:15px;
font-size:13px;
color:#666;
}
.control.checkboxcontrol label {
    display: flex;
    align-items: center;
    justify-content: start;
    gap: 8px;
}

 

.control.checkboxcontrol label input {
    width: auto;
}
</style>

</head>


<body>

<div class="container">

<h1>SVG Converter</h1>

<div class="generator">

<!-- Controls -->

<div class="controls">

<div class="dropzone" id="dropzone">
Drop SVG File Here<br>or Click to Upload
<input type="file" id="fileInput" accept=".svg" multiple hidden>
</div>

<div class="file-list" id="fileList"></div>

<div class="control">
<label>Width</label>
<input type="number" id="width">
</div>

<div class="control">
<label>Height</label>
<input type="number" id="height">
</div>

<div class="control checkboxcontrol">
<label>
<input type="checkbox" id="lockRatio" checked>
Lock Aspect Ratio
</label>
</div>

<div class="control">
<label>Export Format</label>
<select id="format">
<option value="png">PNG</option>
<option value="jpeg">JPG</option>
<option value="webp">WEBP</option>
<option value="ico">ICO</option>
</select>
</div>

<div class="control checkboxcontrol">
<label>
<input type="checkbox" id="transparent" checked>
Transparent Background
</label>
</div>

<button id="downloadBtn">Download File</button>

</div>


<!-- Preview -->

<div class="preview-area">

<h3>Preview</h3>

<div class="preview">
<img id="previewImg">
</div>

</div>

</div>

</div>


<script>

let svgFiles=[]
let svgTexts=[]
let aspectRatio=null

const input=document.getElementById("fileInput")
const drop=document.getElementById("dropzone")
const preview=document.getElementById("previewImg")
const fileList=document.getElementById("fileList")

drop.onclick=()=>input.click()

input.onchange=e=>{
handleFiles(e.target.files)
}

drop.ondragover=e=>{
e.preventDefault()
}

drop.ondrop=e=>{
e.preventDefault()
handleFiles(e.dataTransfer.files)
}

function handleFiles(files){

svgFiles=[...files]
svgTexts=[]
fileList.innerHTML=""

svgFiles.forEach(file=>{

fileList.innerHTML+=file.name+"<br>"

let reader=new FileReader()

reader.onload=e=>{

let svg=optimizeSVG(e.target.result)

svgTexts.push(svg)

let img=new Image()

img.onload=function(){

aspectRatio=img.width/img.height

preview.src="data:image/svg+xml;base64,"+btoa(svg)

if(!width.value){
width.value=img.width
height.value=img.height
}

}

img.src="data:image/svg+xml;base64,"+btoa(svg)

}

reader.readAsText(file)

})

}

/* SVG Optimizer */

function optimizeSVG(svg){

return svg
.replace(/\n/g,"")
.replace(/\t/g,"")
.replace(/\s{2,}/g," ")
.replace(/>\s+</g,"><")

}

/* Aspect Ratio */

const width=document.getElementById("width")
const height=document.getElementById("height")
const lock=document.getElementById("lockRatio")

width.oninput=function(){

if(lock.checked && aspectRatio){

height.value=Math.round(width.value/aspectRatio)

}

}

height.oninput=function(){

if(lock.checked && aspectRatio){

width.value=Math.round(height.value*aspectRatio)

}

}

/* Download */

document.getElementById("downloadBtn").onclick=function(){

if(!svgTexts.length) return

let format=document.getElementById("format").value
let transparent=document.getElementById("transparent").checked

svgTexts.forEach((svg,i)=>{

let img=new Image()

img.onload=function(){

let canvas=document.createElement("canvas")

canvas.width=width.value||img.width
canvas.height=height.value||img.height

let ctx=canvas.getContext("2d")

if(!transparent){

ctx.fillStyle="#ffffff"
ctx.fillRect(0,0,canvas.width,canvas.height)

}

ctx.drawImage(img,0,0,canvas.width,canvas.height)

let link=document.createElement("a")

if(format==="ico"){

link.download="icon_"+i+".ico"
link.href=canvas.toDataURL("image/png")

}else{

link.download="converted_"+i+"."+format
link.href=canvas.toDataURL("image/"+format)

}

link.click()

}

img.src="data:image/svg+xml;base64,"+btoa(svg)

})

}

</script>

</body>
</html>
