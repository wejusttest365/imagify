<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Figma JSON → HTML Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
}

.upload{
border:2px dashed #6366f1;
padding:40px;
text-align:center;
background:white;
border-radius:10px;
cursor:pointer;
}

textarea{
width:100%;
height:160px;
margin-top:10px;
font-family:monospace;
}

button{
padding:12px 18px;
background:#6366f1;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.preview{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
}

#preview{
display:flex;
flex-wrap:wrap;
}

</style>
</head>

<body>

<div class="container">

<h1>Figma JSON → HTML Generator</h1>

<div class="upload" id="upload">
Click to Upload Figma JSON
</div>

<input type="file" id="fileInput" hidden accept=".json">

<div id="status">No file uploaded</div>

<button id="convertBtn" disabled>Convert</button>

<button id="downloadBtn" disabled>Download ZIP</button>

<div class="preview">

<h3>Preview</h3>
<div id="preview"></div>

<h3>HTML</h3>
<textarea id="html"></textarea>

<h3>CSS</h3>
<textarea id="css"></textarea>

</div>

</div>

<script>

const upload = document.getElementById("upload")
const fileInput = document.getElementById("fileInput")
const status = document.getElementById("status")
const convertBtn = document.getElementById("convertBtn")
const downloadBtn = document.getElementById("downloadBtn")

const htmlBox = document.getElementById("html")
const cssBox = document.getElementById("css")
const preview = document.getElementById("preview")

let figma = null

upload.onclick = ()=> fileInput.click()

fileInput.onchange = e => {

let file = e.target.files[0]

if(!file) return

status.innerText = "Uploaded: "+file.name

let reader = new FileReader()

reader.onload = e => {

try{

figma = JSON.parse(e.target.result)

status.innerText = "JSON Loaded"

convertBtn.disabled = false

}catch{

status.innerText = "Invalid JSON"

}

}

reader.readAsText(file)

}

function scan(node, frames){

if(!node) return

if(node.type === "FRAME" || node.type==="GROUP" || node.type==="RECTANGLE"){

frames.push(node)

}

if(node.children){

node.children.forEach(child => scan(child,frames))

}

}

convertBtn.onclick = ()=>{

let frames = []

scan(figma.document, frames)

let html=""
let css=""
let previewHTML=""

frames.forEach((f,i)=>{

let name = f.name || "Layer"

let w = f.absoluteBoundingBox?.width || 200
let h = f.absoluteBoundingBox?.height || 120

let cls = "layer"+i

html += `<div class="${cls}">${name}</div>\n`

css += `.${cls}{
width:${w}px;
height:${h}px;
border:1px solid #ccc;
margin:10px;
display:flex;
align-items:center;
justify-content:center;
}\n`

previewHTML += `<div style="
width:${w}px;
height:${h}px;
border:1px solid #ccc;
margin:10px;
display:flex;
align-items:center;
justify-content:center;
">${name}</div>`

})

htmlBox.value = html
cssBox.value = css
preview.innerHTML = previewHTML

downloadBtn.disabled=false

}

downloadBtn.onclick = ()=>{

const zip = new JSZip()

zip.file("index.html",htmlBox.value)
zip.file("style.css",cssBox.value)

zip.generateAsync({type:"blob"}).then(content=>{

let a = document.createElement("a")

a.href = URL.createObjectURL(content)

a.download = "figma-export.zip"

a.click()

})

}

</script>

</body>
</html>
