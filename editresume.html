<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Clip Path Generator</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#eef2f7;
}

/* APP LAYOUT */

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:white;
border-right:1px solid #e5e7eb;
padding:20px;
display:flex;
flex-direction:column;
gap:18px;
}

.sidebar h3{
margin:0;
font-size:16px;
}

/* SHAPE BUTTONS */

.shape-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.shape-grid button{
padding:10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.shape-grid button:hover{
background:#2563eb;
}

/* UPLOAD */

.upload-box{
position:relative;
border:2px dashed #d1d5db;
border-radius:10px;
padding:16px;
cursor:pointer;
background:#f9fafb;
}

.upload-box:hover{
border-color:#3b82f6;
background:#eff6ff;
}

.upload-box input{
position:absolute;
inset:0;
opacity:0;
cursor:pointer;
}

.upload-ui{
display:flex;
gap:10px;
align-items:center;
}

.upload-icon{
font-size:22px;
}

/* CANVAS */

.canvas{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

.preview{
position:relative;
overflow:hidden;
background:white;

/* GRID */
background-image:
linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);

background-size:40px 40px;

border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
max-width:700px;
max-height:500px;
display:flex;
align-items:center;
justify-content:center;
    min-width: 600px;
    min-height: 400px;
}

.preview img{
max-width:100%;
max-height:100%;
}

/* POINT */

.point{
position:absolute;
width:12px;
height:12px;
background:#ef4444;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
cursor:pointer;
}

/* OUTPUT */

.output{
margin-top:20px;
background:#111827;
color:white;
padding:14px;
border-radius:8px;
width:600px;
max-width:100%;
font-family:monospace;
position:relative;
}

.copy{
position:absolute;
right:10px;
top:10px;
border:none;
background:#3b82f6;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.tools{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.tools button{
padding:9px;
border:none;
background:#10b981;
color:white;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.tools button:hover{
background:#059669;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Shapes</h3>

<div class="shape-grid">
<button data-shape="circle">Circle</button>
<button data-shape="ellipse">Ellipse</button>
<button data-shape="triangle">Triangle</button>
<button data-shape="hexagon">Hexagon</button>
<button data-shape="star">Star</button>
<button data-shape="heart">Heart</button>
<button data-shape="diamond">Diamond</button>
<button data-shape="pentagon">Pentagon</button>
<button data-shape="octagon">Octagon</button>
<button data-shape="arrow">Arrow</button>
<button data-shape="message">Message</button>
<button class="btn btn-block" style="width:100%" data-shape="polygon">Custom</button>
</div>

<h3>Image</h3>

<div class="upload-box">
<input type="file" id="upload">
<div class="upload-ui">
<div class="upload-icon">📁</div>
<div>
<strong>Upload Image</strong><br>
<span style="font-size:12px;color:#6b7280">Click or drag</span>
</div>
</div>
</div>

<h3>Edit</h3>

<div class="tools">
<button id="undo">Undo</button>
<button id="redo">Redo</button>
<button id="zoomIn">Zoom +</button>
<button id="zoomOut">Zoom -</button>
<button id="clear">Clear</button>
</div>

</div>


<!-- CANVAS -->

<div class="canvas">

<div class="preview" id="preview">
<img id="img" src="https://via.placeholder.com/600x400">
</div>

<div class="output">
<button class="copy">Copy</button>
<span id="css">clip-path: circle(50% at 50% 50%)</span>
</div>

</div>

</div>


<script>

let shape="circle"
let points=[]
let dragging=null

let history=[]
let redoStack=[]

const img=$("#img")
const preview=$("#preview")

const grid=40
const snap=true

function snapValue(v){
return snap ? Math.round(v/grid)*grid : v
}

function saveHistory(){
history.push(JSON.stringify(points))
if(history.length>50) history.shift()
}

function undo(){
if(history.length===0) return
redoStack.push(JSON.stringify(points))
points=JSON.parse(history.pop())
renderPoints()
}

function redo(){
if(redoStack.length===0) return
history.push(JSON.stringify(points))
points=JSON.parse(redoStack.pop())
renderPoints()
}

$("#undo").click(undo)
$("#redo").click(redo)

/* CSS */

function updateCSS(){

const w=img.width()
const h=img.height()

if(shape==="polygon"){

const poly=points.map(p=>`${(p.x/w)*100}% ${(p.y/h)*100}%`).join(",")

img.css("clip-path",`polygon(${poly})`)

$("#css").text(`clip-path: polygon(${poly});`)

}else{

let clip="circle(50% at 50% 50%)"

if(shape==="ellipse") clip="ellipse(50% 50% at 50% 50%)"
if(shape==="triangle") clip="polygon(50% 0%,0% 100%,100% 100%)"
if(shape==="hexagon") clip="polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)"
if(shape==="star") clip="polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)"

img.css("clip-path",clip)

$("#css").text(`clip-path: ${clip};`)

}
if(shape==="heart")
clip="polygon(50% 90%, 10% 50%, 10% 25%, 30% 10%, 50% 25%, 70% 10%, 90% 25%, 90% 50%)";

if(shape==="diamond")
clip="polygon(50% 0%,100% 50%,50% 100%,0% 50%)";

if(shape==="pentagon")
clip="polygon(50% 0%, 95% 35%, 80% 100%, 20% 100%, 5% 35%)";

if(shape==="octagon")
clip="polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)";

if(shape==="arrow")
clip="polygon(0% 40%,60% 40%,60% 20%,100% 50%,60% 80%,60% 60%,0% 60%)";

if(shape==="message")
clip="polygon(0% 0%,100% 0%,100% 80%,60% 80%,50% 100%,40% 80%,0% 80%)";
}

/* RENDER */

function renderPoints(){

$(".point").remove()

if(shape!=="polygon") return

points.forEach((p,i)=>{

let el=$("<div class='point'></div>")

el.css({
left:p.x,
top:p.y
})

el.attr("data-i",i)

preview.append(el)

})

updateCSS()

}

/* SHAPE */

function setShape(s){

shape=s
points=[]

$(".point").remove()

if(shape==="polygon"){

let w=img.width()
let h=img.height()

points=[
{x:w/2,y:40},
{x:40,y:h-40},
{x:w-40,y:h-40}
]

}

renderPoints()
updateCSS()

}

$(".shape-grid button").click(function(){
setShape($(this).data("shape"))
})

/* DRAG */

$(document).on("mousedown",".point",function(){
dragging=$(this).data("i")
saveHistory()
})

$(document).on("mouseup",()=>dragging=null)

$(document).on("mousemove",function(e){

if(dragging===null) return

let offset=preview.offset()

points[dragging]={
x:snapValue(e.pageX-offset.left),
y:snapValue(e.pageY-offset.top)
}

renderPoints()

})

/* ADD POINT */

preview.click(function(e){

if(shape!=="polygon") return

if($(e.target).hasClass("point")) return

let offset=preview.offset()

saveHistory()

points.push({
x:snapValue(e.pageX-offset.left),
y:snapValue(e.pageY-offset.top)
})

renderPoints()

})

/* REMOVE */

$(document).on("contextmenu",".point",function(e){

e.preventDefault()

saveHistory()

points.splice($(this).data("i"),1)

renderPoints()

})

/* IMAGE */

$("#upload").change(function(e){

let url=URL.createObjectURL(e.target.files[0])

img.attr("src",url)

})

/* COPY */

$(".copy").click(()=>{
navigator.clipboard.writeText($("#css").text())
})

setShape("circle")


let zoom = 1;

function updateZoom(){
img.css("transform","scale("+zoom+")");
}

$("#zoomIn").click(function(){

zoom += 0.1;

if(zoom > 3) zoom = 3;

updateZoom();

});

$("#zoomOut").click(function(){

zoom -= 0.1;

if(zoom < 0.5) zoom = 0.5;

updateZoom();

});
$("#clear").click(function(){

points = [];

shape = "circle";

img.css("clip-path","none");

$(".point").remove();

$("#css").text("clip-path: none;");

});
</script>

</body>
</html>
